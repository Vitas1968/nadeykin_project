version: 1
source_file: sources_info/Критерии для тендера.xlsx
description: Критерии первичной скоринговой оценки тендера
criteria:
- id: subject_okpd2_oil
  block: Предмет закупки
  criterion: Код ОКПД2 относится к маслам/смазочным материалам
  priority: high
  query: ОКПД2 19.20.29 масло смазочные материалы специальные жидкости
  keywords:
  - ОКПД2
  - 19.20.29
  - масло
  - смазочные материалы
  - специальные жидкости
  - технические масла
  source_sheet: Оценка тендера
  source_row: 2
  notes:
  - Коды/текст про дизельное топливо, бензин, мазут, керосин, услуги ремонта, диагностику,
    техническое обслуживание/сервис без поставки масла
- id: subject_title_oil
  block: Предмет закупки
  criterion: Название закупки содержит товарную сущность «масло»
  priority: high
  query: масло моторное SAE 15W-40 эксплуатационное
  keywords:
  - масло моторное
  - эксплуатационное масло
  - SAE 15W-40
  - 15W-40
  - масло
  source_sheet: Оценка тендера
  source_row: 3
  notes:
  - «топливо», «ГСМ» без уточнения масла, «ремонт», «техническое обслуживание», «услуги
    лаборатории, рапсовое, медицинское и т.д.
- id: purchase_type_goods
  block: Тип закупки
  criterion: Закупка является поставкой товара, а не услугой
  priority: high
  query: поставка товара покупатель принимает и оплачивает количество
  keywords:
  - поставка товара
  - поставщик поставляет
  - покупатель принимает
  - покупатель оплачивает
  - количество
  - тонны
  - литры
  - штуки
  source_sheet: Оценка тендера
  source_row: 4
  notes:
  - «услуги по замене масла», «диагностика», «анализ масла», «ремонт ДГУ» без отдельной
    поставки масла
- id: oil_purpose
  block: Назначение
  criterion: Назначение масла связано с оборудованием/техникой
  priority: low
  query: дизель-генераторные установки двигатели редукторы гидросистемы
  keywords:
  - дизель-генераторные установки
  - двигатели
  - редукторы
  - гидросистемы
  - компрессоры
  - техника
  - оборудование
  source_sheet: Оценка тендера
  source_row: 5
  notes:
  - Назначение отсутствует или не связано с маслами
  - закупка расходников неясного типа
- id: oil_classification
  block: Техническая классификация
  criterion: Указан тип масла и стандарт применимости
  priority: high
  query: API CI-4 CI4+ SAE 15W-40 применимость ТП-22С ТП-22 ХФ 12-16 ХФ-12-16 VDL compressor oil турбинное масло компрессорное масло гидравлическое масло марка масла класс вязкости тип масла стандарт применимости
  keywords:
  - API
  - CI-4
  - CI4
  - CI4+
  - SAE
  - 15W-40
  - ТП-22С
  - ТП-22
  - ХФ 12-16
  - ХФ-12-16
  - VDL
  - compressor oil
  - турбинное масло
  - компрессорное масло
  - гидравлическое масло
  - марка масла
  - класс масла
  - класс вязкости
  - тип масла
  - стандарт применимости
  source_sheet: Оценка тендера
  source_row: 6
  notes:
  - Нет вязкости/допусков
  - указан только бренд без характеристик
  - смешаны несовместимые классы
- id: quantity_measure
  block: Количество
  criterion: Есть измеримая потребность
  priority: high
  query: количество единица измерения ед. изм. кол-во объем поставки объём поставки потребность итого количество
  keywords:
  - количество
  - тонны
  - единица измерения
  - ед. изм.
  - кол-во
  - объем поставки
  - объём поставки
  - потребность
  - итого количество
  source_sheet: Оценка тендера
  source_row: 7
  notes:
  - Количество не указано
  - разные количества в ТТ, спецификации и НМЦ
- id: delivery_period
  block: Сроки поставки
  criterion: Есть фиксированный период поставки
  priority: high
  query: срок поставки период поставки график поставки дней с даты подписания
  keywords:
  - срок поставки
  - период поставки
  - дата поставки
  - 30 days
  - 01.08.2026
  - 30.08.2026
  - с даты подписания
  source_sheet: Оценка тендера
  source_row: 8
  notes:
  - Сроки в разных документах отличаются
  - срок поставки меньше реального логистического плеча
- id: delivery_location
  block: Место поставки
  criterion: Поставка до склада заказчика
  priority: high
  query: Петропавловск-Камчатский склад выгрузка бочек переход права собственности
  keywords:
  - место поставки
  - склад
  - Петропавловск-Камчатский
  - выгрузка
  - переход права собственности
  - силами заказчика
  - силами поставщика
  source_sheet: Оценка тендера
  source_row: 9
  notes:
  - Место не определено
  - в разных документах разные пункты поставки
  - неясно, кто разгружает
- id: packaging_format
  block: Упаковка
  criterion: Определен формат упаковки
  priority: high
  query: металлические бочки 200 220 л 170 220 кг поддоны северное исполнение
  keywords:
  - металлические бочки
  - 200-220 l
  - 170-220 kg
  - на поддонах
  - северное исполнение
  - пломбированные бочки
  - заполненные на НПЗ
  source_sheet: Оценка тендера
  source_row: 10
  notes:
  - Упаковка не соответствует фактической доступности продукта
  - требуется упаковка, которую поставщик не использует
- id: quality_freshness
  block: Качество
  criterion: Есть требования по сроку изготовления товара
  priority: high
  query: изготовления годности розлива
  keywords:
  - дата изготовления
  - указание даты изготовления
  - срок изготовления
  - дата производства
  - дата выпуска
  - срок годности
  - остаточный срок годности
  - срок хранения
  - дата розлива
  - изготовлен не ранее
  - изготовлена не ранее
  - изготовлено не ранее
  - изготовлены не ранее
  - произведен не ранее
  - произведён не ранее
  - произведена не ранее
  - произведено не ранее
  - произведены не ранее
  - выпущен не ранее
  - выпущена не ранее
  - выпущено не ранее
  - выпущены не ранее
  - не ранее даты изготовления
  - не ранее даты производства
  - не ранее даты выпуска
  source_sheet: Оценка тендера
  source_row: 11
- id: quality_documents
  block: Качество
  criterion: Требуются документы качества
  priority: high
  query: паспорт качества декларация ТР ТС 030 2012 протоколы лаборатории
  keywords:
  - паспорт качества
  - декларация ТР ТС 030/2012
  - протоколы лаборатории
  - документы качества
  - реквизиты декларации
  - для каждой партии
  source_sheet: Оценка тендера
  source_row: 12
  notes:
  - Требуется документ, который поставщик не может предоставить на этапе заявки/победителя
  - документ нужен по каждой посталяемой партии.
- id: msp_restriction
  block: Процедура
  criterion: Закупка только для субъектов МСП
  priority: high
  query: субъекты МСП субъектов МСП субъекты малого и среднего предпринимательства субъектов малого и среднего предпринимательства субъекты СМП субъектов СМП только МСП только СМП закупка для МСП закупка для СМП
  keywords:
  - субъекты МСП
  - субъектов МСП
  - субъекты малого и среднего предпринимательства
  - субъектов малого и среднего предпринимательства
  - субъекты СМП
  - субъектов СМП
  - только МСП
  - только СМП
  - закупка для МСП
  - закупка для СМП
  source_sheet: Оценка тендера
  source_row: 13
  notes:
  - Участник не в реестре МСП
  - участие возможно только через дилера/партнера
- id: procurement_method
  block: Процедура
  criterion: Способ закупки — электронный аукцион
  priority: medium
  query: электронный аукцион аукцион в электронной форме аукцион электронной форме проведение электронного аукциона электронный аукцион на право заключения договора
  keywords:
  - электронный аукцион
  - аукцион в электронной форме
  - проведение электронного аукциона
  - электронный аукцион на право заключения договора
  source_sheet: Оценка тендера
  source_row: 14
- id: price_nmc
  block: Цена
  criterion: НМЦ и валюта
  priority: high
  query: НМЦК НМЦД цена договора руб без НДС цена за единицу
  keywords:
  - НМЦК
  - НМЦД
  - цена договора
  - цена за единицу
  - рубли
  - без НДС
  - сумма договора
  - начальная максимальная цена
  source_sheet: Оценка тендера
  source_row: 15
  notes:
  - НМЦ включает/не включает НДС неоднозначно
  - в НМЦ и форме цены разные базы
- id: security_requirement
  block: Обеспечение
  criterion: Обязательство по обеспечению участия в тендере или обеспечения по договору
  priority: high
  query: обеспечение заявки обеспечение договора банковская гарантия 5% 3% контракта
  keywords:
  - обеспечение заявки
  - обеспечение участия
  - обеспечение исполнения
  - обеспечение договора
  - банковская гарантия
  - независимая гарантия
  - денежные средства
  - процент от цены
  - 5%
  - 3%
  negative_terms:
  - обеспечение заявки на участие в закупке не требуется
  - обеспечение заявки не требуется
  - обеспечение участия не требуется
  - обеспечение исполнения договора не требуется
  - обеспечение исполнения контракта не требуется
  - обеспечение исполнения обязательств по договору не требуется
  - обеспечение исполнения не требуется
  - обеспечение договора не требуется
  - не требуется обеспечение
  - обеспечение не установлено
  - не установлено обеспечение
  - обеспечение не предусмотрено
  - не предусмотрено обеспечение
  source_sheet: Оценка тендера
  source_row: 16
- id: national_regime
  block: Национальный режим
  criterion: Применяется преимущество российской продукции
  priority: high
  query: национальный режим преимущество российской продукции запрет импорт
  keywords:
  - национальный режим
  - преимущество российской продукции
  - российская продукция
  - импорт
  - запрет
  - ограничение
  - Постановление №1875
  - '1875'
  - страна происхождения
  - реестровая запись
  - Минпромторг
  source_sheet: Оценка тендера
  source_row: 17
  notes:
  - Страна происхождения не указана
  - иностранный товар может получить менее выгодный режим
- id: contract_terms
  block: Договор
  criterion: Проект договора обязателен без некритичных пунктов или протокол разногласий
  priority: high
  query: проект договора приложение №2 протокол разногласий корректировка не допускается
  keywords:
  - проект договора
  - приложение №2
  - протокол разногласий
  - корректировка не допускается
  - условия договора
  source_sheet: Оценка тендера
  source_row: 18
  notes:
  - Попытка загрузить протокол разногласий по существенным условиям может привести
    к отклонению/неподписанию
- id: after_sales_service
  block: Требования к сервису после поставки
  criterion: Специфические требования к поставке
  priority: high
  query: сервис после поставки поставщик обязан проверять качество хранение товара
  keywords:
  - сервис после поставки
  - поставщик обязан
  - хранение товара
  - проверка качества
  - после поставки
  - сервису
  source_sheet: Оценка тендера
  source_row: 19
