version: 1
source_file: sources_info/Критерии для тендера.xlsx
description: Критерии первичной скоринговой оценки тендера
criteria:
- id: subject_okpd2_oil
  block: Предмет закупки
  criterion: Код ОКПД2 относится к маслам/смазочным материалам
  priority: high
  query: Код ОКПД2 относится к маслам/смазочным материалам
  keywords:
  - Предмет закупки
  - Код ОКПД2 относится к маслам/смазочным материалам
  - 19.20.29
  - формулировки «масло», «смазочные материалы», «специальные жидкости»
  source_sheet: Оценка тендера
  source_row: 2
  notes:
  - Коды/текст про дизельное топливо, бензин, мазут, керосин, услуги ремонта, диагностику, техническое обслуживание/сервис
    без поставки масла
- id: subject_title_oil
  block: Предмет закупки
  criterion: Название закупки содержит товарную сущность «масло»
  priority: high
  query: Название закупки содержит товарную сущность «масло»
  keywords:
  - Предмет закупки
  - Название закупки содержит товарную сущность «масло»
  - «Поставка эксплуатационного масла», «масло моторное», «SAE 15W-40»
  source_sheet: Оценка тендера
  source_row: 3
  notes:
  - «топливо», «ГСМ» без уточнения масла, «ремонт», «техническое обслуживание», «услуги лаборатории, рапсовое, медицинское
    и т.д.
- id: purchase_type_goods
  block: Тип закупки
  criterion: Закупка является поставкой товара, а не услугой
  priority: high
  query: Закупка является поставкой товара, а не услугой
  keywords:
  - Тип закупки
  - Закупка является поставкой товара, а не услугой
  - «Поставщик поставляет, Покупатель принимает и оплачивает»
  - есть количество в тоннах/литрах/штуках
  source_sheet: Оценка тендера
  source_row: 4
  notes:
  - «услуги по замене масла», «диагностика», «анализ масла», «ремонт ДГУ» без отдельной поставки масла
- id: oil_purpose
  block: Назначение
  criterion: Назначение масла связано с оборудованием/техникой
  priority: low
  query: Назначение масла связано с оборудованием/техникой
  keywords:
  - Назначение
  - Назначение масла связано с оборудованием/техникой
  - Дизель-генераторные установки, двигатели, редукторы, гидросистемы, компрессоры
  source_sheet: Оценка тендера
  source_row: 5
  notes:
  - Назначение отсутствует или не связано с маслами
  - закупка расходников неясного типа
- id: oil_classification
  block: Техническая классификация
  criterion: Указан тип масла и стандарт применимости
  priority: high
  query: Указан тип масла и стандарт применимости
  keywords:
  - Техническая классификация
  - Указан тип масла и стандарт применимости
  - API CI4/CI4+, SAE 15W-40
  source_sheet: Оценка тендера
  source_row: 6
  notes:
  - Нет вязкости/допусков
  - указан только бренд без характеристик
  - смешаны несовместимые классы
- id: quantity_measure
  block: Количество
  criterion: Есть измеримая потребность
  priority: high
  query: Есть измеримая потребность
  keywords:
  - Количество
  - Есть измеримая потребность
  - 100 тонн, 300 литров, 150 штук (в канистрах, бочках)
  source_sheet: Оценка тендера
  source_row: 7
  notes:
  - Количество не указано
  - разные количества в ТТ, спецификации и НМЦ
- id: delivery_period
  block: Сроки поставки
  criterion: Есть фиксированный период поставки
  priority: high
  query: Есть фиксированный период поставки
  keywords:
  - Сроки поставки
  - Есть фиксированный период поставки
  - 01.08.2026—30.08.2026, 30 дней с даты подписания договора/спецификации
  source_sheet: Оценка тендера
  source_row: 8
  notes:
  - Сроки в разных документах отличаются
  - срок поставки меньше реального логистического плеча
- id: delivery_location
  block: Место поставки
  criterion: Поставка до склада заказчика
  priority: high
  query: Поставка до склада заказчика
  keywords:
  - Место поставки
  - Поставка до склада заказчика
  - Склад АО «ЮЭСК» в г. Петропавловск-Камчатский, с выгрузкой бочек силами заказчика/поставщика. Право перехода собственности
    на складе покупателя
  source_sheet: Оценка тендера
  source_row: 9
  notes:
  - Место не определено
  - в разных документах разные пункты поставки
  - неясно, кто разгружает
- id: packaging_format
  block: Упаковка
  criterion: Определен формат упаковки
  priority: high
  query: Определен формат упаковки
  keywords:
  - Упаковка
  - Определен формат упаковки
  - Металлические пломбированные бочки 200–220 л или 170-220 кг, заполненные на НПЗ, на поддонах. В "северном исполнении".
  source_sheet: Оценка тендера
  source_row: 10
  notes:
  - Упаковка не соответствует фактической доступности продукта
  - требуется упаковка, которую поставщик не использует
- id: quality_freshness
  block: Качество
  criterion: Есть требования по сроку изготовления товара
  priority: high
  query: Есть требования по сроку изготовления товара
  keywords:
  - Качество
  - Есть требования по сроку изготовления товара
  - Товар должен быть новым, товар должен быть произведен не ранее 3х месяцев с даты поставки продукции, товар должен быть
    произведен не ранее 1 июня 2025 года
  source_sheet: Оценка тендера
  source_row: 11
- id: quality_documents
  block: Качество
  criterion: Требуются документы качества
  priority: high
  query: Требуются документы качества
  keywords:
  - Качество
  - Требуются документы качества
  - Паспорт качества
  - реквизиты декларации ТР ТС 030/2012
  - протоколы независимой лаборатории для каждой партии до/после поставки, во время тендера
  source_sheet: Оценка тендера
  source_row: 12
  notes:
  - Требуется документ, который поставщик не может предоставить на этапе заявки/победителя
  - документ нужен по каждой посталяемой партии.
- id: msp_restriction
  block: Процедура
  criterion: Закупка только для субъектов МСП
  priority: high
  query: Закупка только для субъектов МСП
  keywords:
  - Процедура
  - Закупка только для субъектов МСП
  - «участниками могут быть только субъекты МСП»
  source_sheet: Оценка тендера
  source_row: 13
  notes:
  - Участник не в реестре МСП
  - участие возможно только через дилера/партнера
- id: procurement_method
  block: Процедура
  criterion: Способ закупки — электронный аукцион
  priority: medium
  query: Способ закупки — электронный аукцион
  keywords:
  - Процедура
  - Способ закупки — электронный аукцион
  - Ссылка на конкретный url адрес процедуры
  source_sheet: Оценка тендера
  source_row: 14
- id: price_nmc
  block: Цена
  criterion: НМЦ и валюта
  priority: medium
  query: НМЦ и валюта
  keywords:
  - Цена
  - НМЦ и валюта
  - 20 166 500 руб. без НДС
  - цена договора в рублях, цена за ед товара 150000 руб без НДС, сюда же объем
  source_sheet: Оценка тендера
  source_row: 15
  notes:
  - НМЦ включает/не включает НДС неоднозначно
  - в НМЦ и форме цены разные базы
- id: security_requirement
  block: Обеспечение
  criterion: Обязательство по обеспечению участия в тендере или обеспечения по договору
  priority: high
  query: Обязательство по обеспечению участия в тендере или обеспечения по договору
  keywords:
  - Обеспечение
  - Обязательство по обеспечению участия в тендере или обеспечения по договору
  - Обеспечение участия в тендерной процедуре составляет 5% от стоимости предложения Участника, предоставляется банковская
    гарантия в размере 3% от стоимости продукции на весь сроки исполнения контракта.
  source_sheet: Оценка тендера
  source_row: 16
- id: national_regime
  block: Национальный режим
  criterion: Применяется преимущество российской продукции
  priority: medium
  query: Применяется преимущество российской продукции
  keywords:
  - Национальный режим
  - Применяется преимущество российской продукции
  - Установлен режим преимущества российской продукции
  source_sheet: Оценка тендера
  source_row: 17
  notes:
  - Страна происхождения не указана
  - иностранный товар может получить менее выгодный режим
- id: contract_terms
  block: Договор
  criterion: Проект договора обязателен без некритичных пунктов или протокол разногласий
  priority: high
  query: Проект договора обязателен без некритичных пунктов или протокол разногласий
  keywords:
  - Договор
  - Проект договора обязателен без некритичных пунктов или протокол разногласий
  - Договор заключается в редакции Приложения №2
  - корректировка не допускается, допускается протокол разногласий
  source_sheet: Оценка тендера
  source_row: 18
  notes:
  - Попытка загрузить протокол разногласий по существенным условиям может привести к отклонению/неподписанию
- id: after_sales_service
  block: Требования к сервису после поставки
  criterion: Специфические требования к поставке
  priority: high
  query: Специфические требования к поставке
  keywords:
  - Требования к сервису после поставки
  - Специфические требования к поставке
  - Поставщик обязан обеспечить хранение товара на складе на время действия договора, поставщик обязан проверять качество у
    Покупателя после поставки и пр.
  source_sheet: Оценка тендера
  source_row: 19
